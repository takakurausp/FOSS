<!DOCTYPE html>
<html>
<head>
    <title>Test HTML Fix</title>
</head>
<body>
    <h1>Test HTML Structure</h1>
    
    <div id="test-container"></div>
    
    <script>
        // Test renderCollapsibleAbstract function
        function renderCollapsibleAbstract(abstractJP, abstractEN) {
            const hasAbstractJP = abstractJP && abstractJP.trim() !== '';
            const hasAbstractEN = abstractEN && abstractEN.trim() !== '';
            
            if (!hasAbstractJP && !hasAbstractEN) {
                return '';
            }
            
            // ユニークなIDを生成
            const abstractId = 'abstract-' + Math.random().toString(36).substr(2, 9);
            
            let abstractContent = '';
            
            if (hasAbstractJP) {
                abstractContent += `
                    <div style="margin-bottom: ${hasAbstractEN ? '1rem' : '0'}">
                        <h4 style="margin:0 0 0.5rem; font-size:0.95rem; color:#4b5563;">要旨 (日本語) / Abstract (Japanese)</h4>
                        <div class="abstract-cell">${abstractJP}</div>
                    </div>`;
            }
            
            if (hasAbstractEN) {
                abstractContent += `
                    <div>
                        <h4 style="margin:0 0 0.5rem; font-size:0.95rem; color:#4b5563;">要旨 (英語) / Abstract (English)</h4>
                        <div class="abstract-cell">${abstractEN}</div>
                    </div>`;
            }
            
            return `
                <div style="margin-top: 1.5rem;">
                    <button type="button" 
                            onclick="toggleAbstract('${abstractId}')"
                            style="background:none; border:1px solid #d1d5db; border-radius:6px; padding:0.5rem 1rem; font-size:0.9rem; color:#374151; cursor:pointer; display:flex; align-items:center; gap:0.5rem;">
                        <span id="${abstractId}-icon">▶</span>
                        <span>アブストラクトを見る（英語表記もつけて） / View Abstract (with English version)</span>
                    </button>
                    <div id="${abstractId}" style="display:none; margin-top:1rem; padding:1rem; background:#f9fafb; border-radius:8px; border:1px solid #e5e7eb;">
                        ${abstractContent}
                    </div>
                </div>
            `;
        }
        
        function toggleAbstract(id) {
            const abstractDiv = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            if (abstractDiv.style.display === 'none') {
                abstractDiv.style.display = 'block';
                icon.textContent = '▼';
            } else {
                abstractDiv.style.display = 'none';
                icon.textContent = '▶';
            }
        }
        
        // Test the function
        document.getElementById('test-container').innerHTML = renderCollapsibleAbstract(
            'これは日本語のアブストラクトです。テスト用の内容です。',
            'This is an English abstract. Test content for demonstration.'
        );
    </script>
</body>
</html>
