<!DOCTYPE html>
<html>
<head>
    <title>Test Progress Timeline</title>
    <style>
        .status-card {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }
        .abstract-cell {
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #374151;
        }
    </style>
</head>
<body>
    <h1>Test Progress Timeline for Different Statuses</h1>
    
    <div id="test-results"></div>
    
    <script>
        function buildProgressTimeline(currentStatus) {
            const steps = [
                { key: 'submitted',        en: 'Manuscript Received',  ja: '論文投稿受付済み' },
                { key: 'editor_requested', en: 'Assigning Editor',     ja: '担当編集者選定中' },
                { key: 'editor_assigned',  en: 'Editor Assigned',      ja: '担当編集者割り当て済み' },
                { key: 'reviewing',        en: 'Under Review',         ja: '査読中' },
                { key: 'reviewed',         en: 'Review Complete',      ja: '査読完了' },
                { key: 'decision',         en: 'Decision Notified',    ja: '判定通知済み' }
            ];

            const currentIdx = Math.max(0, steps.findIndex(s => s.key === currentStatus));
            const parts = [];

            steps.forEach((step, idx) => {
                const done   = idx < currentIdx;
                const active = idx === currentIdx;
                const circleBg  = done ? '#059669' : active ? '#2563eb' : '#e2e8f0';
                const circleFg  = (done || active) ? '#fff' : '#9ca3af';
                const textColor = active ? '#1e40af' : done ? '#374151' : '#9ca3af';
                const fw        = active ? '700' : '400';
                const icon      = done ? '&#10003;' : String(idx + 1);

                parts.push(`<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:72px;max-width:110px;">` +
                    `<div style="width:30px;height:30px;border-radius:50%;background:${circleBg};display:flex;align-items:center;justify-content:center;color:${circleFg};font-size:12px;font-weight:bold;flex-shrink:0;">${icon}</div>` +
                    `<div style="margin-top:6px;text-align:center;font-size:0.68rem;color:${textColor};font-weight:${fw};line-height:1.4;">${step.en}<br><span style="font-size:0.63rem;">${step.ja}</span></div>` +
                    `</div>`);

                if (idx < steps.length - 1) {
                    const lineColor = done ? '#059669' : '#e2e8f0';
                    parts.push(`<div style="flex:1;min-width:6px;height:2px;background:${lineColor};margin-top:14px;align-self:flex-start;"></div>`);
                }
            });

            return `<div style="display:flex;align-items:flex-start;overflow-x:auto;padding:0.75rem 0 1rem;">${parts.join('')}</div>`;
        }
        
        // Test different statuses
        const testStatuses = ['submitted', 'editor_requested', 'editor_assigned', 'reviewing', 'reviewed', 'decision'];
        
        const resultsDiv = document.getElementById('test-results');
        
        testStatuses.forEach(status => {
            const timeline = buildProgressTimeline(status);
            const testDiv = document.createElement('div');
            testDiv.className = 'status-card';
            testDiv.innerHTML = `
                <h3 style="margin:0 0 0.5rem;">進捗状況 / Progress (Status: ${status})</h3>
                ${timeline}
                <p>Current status: <strong>${status}</strong></p>
            `;
            resultsDiv.appendChild(testDiv);
        });
    </script>
</body>
</html>
